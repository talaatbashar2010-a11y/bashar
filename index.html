<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بطولة صعود التشكيلة</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{
font-size:25px;
cursor:pointer;
}

#menuPanel{
display:none;
background:#111827;
padding:10px;
}

button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
margin:5px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#2563eb;
color:white;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

</style>
</head>

<body>

<header>

<h2>بطولة صعود التشكيلة</h2>

<div class="menu" onclick="toggleMenu()">☰</div>

</header>

<div id="menuPanel">

<button onclick="showScreen('home')">الرئيسية</button>

<button onclick="showScreen('table')">جدول الترتيب</button>

<button onclick="showScreen('matches')">المباريات</button>

</div>

<div id="home" class="screen active">

<h1>مرحبا بكم في البطولة</h1>

<p>اختر من القائمة لعرض الميزات</p>

</div>

<div id="table" class="screen">

<h2>جدول الترتيب</h2>

<table>

<thead>

<tr>
<th>اللاعب</th>
<th>لعب</th>
<th>فوز</th>
<th>تعادل</th>
<th>خسارة</th>
<th>له</th>
<th>عليه</th>
<th>نقاط</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div id="matches" class="screen">

<h2>تسجيل نتيجة مباراة</h2>

<select id="p1"></select>
<input id="g1" type="number" placeholder="أهداف">

VS

<select id="p2"></select>
<input id="g2" type="number" placeholder="أهداف">

<br><br>

<input id="code" placeholder="كود اللاعب">

<br><br>

<button onclick="saveMatch()">حفظ النتيجة</button>

</div>

<script>

const SUPABASE_URL="https://phgeppldziwtjqmomvlt.supabase.co"
const SUPABASE_KEY="PUT_YOUR_KEY_HERE"

const supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

function toggleMenu(){

let menu=document.getElementById("menuPanel")

menu.style.display=menu.style.display==="block"?"none":"block"

}

function showScreen(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

async function loadPlayers(){

let {data}=await supabase
.from("player")
.select("*")
.order("points",{ascending:false})

let body=document.getElementById("tableBody")

body.innerHTML=""

data.forEach(p=>{

body.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.played}</td>
<td>${p.win}</td>
<td>${p.draw}</td>
<td>${p.loss}</td>
<td>${p.goals_for}</td>
<td>${p.goals_against}</td>
<td>${p.points}</td>
</tr>
`

})

let s1=document.getElementById("p1")
let s2=document.getElementById("p2")

s1.innerHTML=""
s2.innerHTML=""

data.forEach(p=>{

s1.innerHTML+=`<option>${p.name}</option>`
s2.innerHTML+=`<option>${p.name}</option>`

})

}

async function saveMatch(){

let p1=document.getElementById("p1").value
let p2=document.getElementById("p2").value

let g1=parseInt(document.getElementById("g1").value)
let g2=parseInt(document.getElementById("g2").value)

let code=document.getElementById("code").value

if(code!=="1234"){
alert("كود غير صحيح")
return
}

let {data:players}=await supabase
.from("player")
.select("*")
.or(`name.eq.${p1},name.eq.${p2}`)

let A=players.find(p=>p.name===p1)
let B=players.find(p=>p.name===p2)

A.played++
B.played++

A.goals_for+=g1
A.goals_against+=g2

B.goals_for+=g2
B.goals_against+=g1

if(g1>g2){
A.win++
B.loss++
A.points+=3
}

else if(g2>g1){
B.win++
A.loss++
B.points+=3
}

else{
A.draw++
B.draw++
A.points++
B.points++
}

await supabase.from("player").update(A).eq("id",A.id)
await supabase.from("player").update(B).eq("id",B.id)

loadPlayers()

}

loadPlayers()

</script>

</body>
</html>
