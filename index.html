<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة صعود التشكيلة | المجلد الرسمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #16263f;
            --accent: #22c55e;
            --danger: #ef4444;
            --bg: #0b1a33;
            --text: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; padding-bottom: 50px; }
        
        header { 
            background: var(--secondary); 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .menu-btn { font-size: 28px; cursor: pointer; padding: 0 15px; }
        
        #menuPanel { 
            display: none; 
            background: var(--secondary); 
            padding: 10px; 
            border-bottom: 1px solid #333; 
            flex-wrap: wrap; 
            justify-content: center;
        }

        button { padding: 12px 20px; border: none; background: var(--primary); color: white; margin: 5px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button.admin-btn { background: var(--danger); }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease-in-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Table Styling */
        .table-container { overflow-x: auto; margin: 20px auto; width: 95%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; background: white; color: #333; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; font-size: 14px; text-transform: uppercase; }
        
        /* Leader Highlight */
        tr.leader { background: #fff9c4 !important; font-weight: bold; border-right: 5px solid #fbc02d; }
        .leader-badge { background: #fbc02d; color: #333; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-right: 5px; }

        /* Match Boxes */
        .match-card { background: var(--secondary); padding: 15px; border-radius: 12px; margin: 10px auto; max-width: 500px; border: 1px solid #333; }
        .match-row { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; }
        .vs { font-weight: bold; color: var(--primary); }
        
        .round-selector { margin: 20px; }
        select { padding: 10px; border-radius: 8px; background: white; color: black; font-weight: bold; }

        .loading { padding: 20px; color: var(--accent); font-size: 18px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div style="width: 40px;"></div>
    <h2 style="margin:0;">🏆 صعود التشكيلة</h2>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div id="menuPanel">
    <button onclick="showScreen('home')">🏠 الرئيسية</button>
    <button onclick="showScreen('table')">📊 جدول الترتيب</button>
    <button onclick="showScreen('rounds')">📅 الجولات</button>
    <button class="admin-btn" onclick="checkAdmin()">⚙️ لوحة المدير</button>
</div>

<!-- الشاشة الرئيسية -->
<div id="home" class="screen active">
    <img src="https://via.placeholder.com/150/2563eb/ffffff?text=SOUD" alt="Logo" style="width: 150px; border-radius: 50%; border: 4px solid var(--primary); margin: 20px;">
    <h1>مرحباً بكم في البطولة</h1>
    <p style="color: #bbb;">إشراف: بشار طلعت & محمد محمود عادل</p>
    <div style="background: var(--secondary); padding: 20px; border-radius: 15px; margin: 20px auto; max-width: 400px;">
        <h3 id="currentLeaderName">جاري تحديد المتصدر...</h3>
    </div>
</div>

<!-- شاشة الجدول -->
<div id="table" class="screen">
    <h2>📊 ترتيب دوري صعود التشكيلة</h2>
    <div id="loadingTable" class="loading">جاري تحديث البيانات...</div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>اللاعب</th>
                    <th>لعب</th>
                    <th>فوز</th>
                    <th>تعادل</th>
                    <th>خسارة</th>
                    <th>له</th>
                    <th>عليه</th>
                    <th>فارق</th>
                    <th>نقاط</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- شاشة الجولات والمباريات -->
<div id="rounds" class="screen">
    <h2>📅 مباريات البطولة حسب الجولة</h2>
    <div class="round-selector">
        <label>اختر الجولة: </label>
        <select id="roundSelect" onchange="loadMatchesByRound()">
            <option value="1">الجولة الأولى</option>
            <option value="2">الجولة الثانية</option>
            <option value="3">الجولة الثالثة</option>
            <option value="4">الجولة الرابعة</option>
        </select>
    </div>
    <div id="matchesList">
        <!-- ستظهر المباريات هنا -->
    </div>
</div>

<!-- لوحة المدير (مخفية) -->
<div id="admin" class="screen">
    <h2 style="color: var(--danger);">⚙️ تسجيل نتيجة مباراة</h2>
    <div class="match-card">
        <div class="match-row">
            <div>
                <label>لاعب 1</label><br>
                <select id="admP1"></select>
                <input type="number" id="admG1" placeholder="0">
            </div>
            <div class="vs">VS</div>
            <div>
                <label>لاعب 2</label><br>
                <select id="admP2"></select>
                <input type="number" id="admG2" placeholder="0">
            </div>
        </div>
        <div style="margin-top:15px;">
            <label>الجولة: </label>
            <input type="number" id="admRound" value="1" style="width:50px;">
        </div>
        <button onclick="submitMatch()" id="saveBtn" style="background: var(--accent); margin-top:20px; width: 100%;">حفظ النتيجة وإعلانها ✅</button>
    </div>
</div>

<script>
    // بيانات الربط الخاصة بك يا بشار
    const SUPABASE_URL = "https://phgeppldziwtjqmomvlt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZ2VwcGxkeml3dGpxbW9tdmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDYwNTIsImV4cCI6MjA4OTAzMjA1Mn0.eKq3YFv_3F28p8h27K986m-047zK8H551qP8f_1u-3I";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isAdmin = false;

    function toggleMenu() {
        const m = document.getElementById("menuPanel");
        m.style.display = (m.style.display === "flex") ? "none" : "flex";
    }

    function showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        if(window.innerWidth < 768) toggleMenu();
        if(id === 'table') refreshData();
        if(id === 'rounds') loadMatchesByRound();
    }

    function checkAdmin() {
        if(isAdmin) { showScreen('admin'); return; }
        const pass = prompt("أدخل كلمة سر المدير:");
        if(pass === "bashar123") { // كلمة السر
            isAdmin = true;
            alert("مرحباً أيها المدير بشار!");
            loadAdminPlayers();
            showScreen('admin');
        } else {
            alert("كلمة سر خاطئة!");
        }
    }

    async function refreshData() {
        document.getElementById("loadingTable").style.display = "block";
        // جلب اللاعبين مع ترتيبهم حسب النقاط ثم فارق الأهداف ثم الأهداف المسجلة
        let { data, error } = await _supabase
            .from("player")
            .select("*")
            .order("points", { ascending: false })
            .order("goals_for", { ascending: false });

        if (error) return;

        const body = document.getElementById("tableBody");
        body.innerHTML = "";
        
        data.forEach((p, index) => {
            const diff = p.goals_for - p.goals_against;
            const isLeader = index === 0;
            if(isLeader) document.getElementById("currentLeaderName").innerHTML = `🔝 المتصدر الحالي: ${p.name}`;

            body.innerHTML += `
                <tr class="${isLeader ? 'leader' : ''}">
                    <td>${isLeader ? '<span class="leader-badge">🥇</span>' : index + 1}</td>
                    <td>${p.name}</td>
                    <td>${p.played}</td>
                    <td>${p.win}</td>
                    <td>${p.draw}</td>
                    <td>${p.loss}</td>
                    <td>${p.goals_for}</td>
                    <td>${p.goals_against}</td>
                    <td>${diff > 0 ? '+' + diff : diff}</td>
                    <td style="color:var(--primary); font-weight:bold;">${p.points}</td>
                </tr>
            `;
        });
        document.getElementById("loadingTable").style.display = "none";
    }

    async function loadAdminPlayers() {
        let { data } = await _supabase.from("player").select("id, name");
        const s1 = document.getElementById("admP1");
        const s2 = document.getElementById("admP2");
        s1.innerHTML = s2.innerHTML = "";
        data.forEach(p => {
            let opt = `<option value="${p.id}">${p.name}</option>`;
            s1.innerHTML += opt; s2.innerHTML += opt;
        });
    }

    async function submitMatch() {
        const p1Id = document.getElementById("admP1").value;
        const p2Id = document.getElementById("admP2").value;
        const g1 = parseInt(document.getElementById("admG1").value);
        const g2 = parseInt(document.getElementById("admG2").value);
        const round = document.getElementById("admRound").value;

        if (p1Id === p2Id) return alert("لا يمكن اختيار نفس اللاعب!");
        if (isNaN(g1) || isNaN(g2)) return alert("دخل الأهداف!");

        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.innerText = "جاري المعالجة...";

        // جلب بيانات اللاعبين لتحديثها
        let { data: players } = await _supabase.from("player").select("*").in("id", [p1Id, p2Id]);
        let A = players.find(p => p.id == p1Id);
        let B = players.find(p => p.id == p2Id);

        // منطق الحساب
        A.played++; B.played++;
        A.goals_for += g1; A.goals_against += g2;
        B.goals_for += g2; B.goals_against += g1;

        if (g1 > g2) { A.win++; B.loss++; A.points += 3; }
        else if (g2 > g1) { B.win++; A.loss++; B.points += 3; }
        else { A.draw++; B.draw++; A.points += 1; B.points += 1; }

        // تحديث اللاعبين
        await _supabase.from("player").update(A).eq("id", A.id);
        await _supabase.from("player").update(B).eq("id", B.id);

        // تسجيل المباراة في جدول التاريخ (اختياري لو عندك جدول matches)
        alert("تم التحديث! مبروك للفائز.");
        btn.disabled = false;
        btn.innerText = "حفظ النتيجة وإعلانها ✅";
        showScreen('table');
    }

    // ملاحظة: لو عندك جدول للمباريات (matches) ممكن نضيف كود لعرض الجولات هنا
    function loadMatchesByRound() {
        const round = document.getElementById("roundSelect").value;
        const list = document.getElementById("matchesList");
        list.innerHTML = `<p style="color:var(--accent);">سيتم عرض مباريات الجولة ${round} هنا فور توفرها في قاعدة البيانات.</p>`;
    }

    window.onload = refreshData;
</script>
</body>
</html>
