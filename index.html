<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة صعود التشكيلة | الموحدة</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="صعود التشكيلة">
    <link rel="apple-touch-icon" href="https://media-hbe1-1.cdn.whatsapp.net/v/t61.24694-24/647336908_1580636549841823_5728099139273373944_n.jpg?ccb=11-4&oh=01_Q5Aa4AFV-HT1Xph_EtBM8J4Le0eYjp1yAVPXySspZDmkXCvENA&oe=69C30463">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --accent: #10b981;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --gold: #fbbf24;
            --danger: #f43f5e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--secondary);
            color: var(--text-light);
            margin: 0; padding-bottom: 70px; /* مساحة للقائمة السفلية */
            min-height: 100vh;
        }

        /* القائمة السفلية (مثل التطبيقات) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card-bg);
            height: 65px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; text-decoration: none; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s; flex: 1;
        }

        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        header {
            background: var(--card-bg);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky; top: 0; z-index: 1001;
        }

        main { padding: 20px; }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* البطاقات والجداول */
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .standing-table { width: 100%; border-collapse: collapse; background: white; color: #1e293b; border-radius: 12px; overflow: hidden; }
        .standing-table th { background: #334155; color: white; padding: 12px; font-size: 0.85rem; }
        .standing-table td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; font-weight: 600; }

        .match-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .score { background: var(--secondary); color: var(--gold); padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 1.2rem; }

        /* الأزرار والمدخلات */
        .btn-action {
            background: var(--primary); color: white; border: none; padding: 12px 20px;
            border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px;
        }
        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            background: #0f172a; color: white; border: 1px solid #334155;
        }

        .gold-text { color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 1.2rem; color: var(--gold);">🏆 صعود التشكيلة</div>
    <div id="connectionDot" style="width: 12px; height: 12px; background: #10b981; border-radius: 50%;" title="متصل"></div>
</header>

<main>
    <!-- الرئيسية (index سابقاً) -->
    <div id="home" class="view active">
        <div class="card" style="background: linear-gradient(135deg, #1e40af, #2563eb); text-align: center;">
            <h2 style="margin: 0;">أهلاً كابتن بشار 👋</h2>
            <p style="opacity: 0.8;">الترتيب المباشر للبطولة</p>
        </div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <table class="standing-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: right;">اللاعب</th>
                        <th>لعب</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="standingsBody">
                    <tr><td colspan="4" style="padding: 40px;">جاري تحميل البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- المباريات (matches سابقاً) -->
    <div id="matches" class="view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">📅 سجل النتائج</h2>
            <select id="roundFilter" onchange="loadMatches()" style="width: auto; margin: 0; padding: 5px 15px;">
                <option value="1">جولة 1</option>
                <option value="2">جولة 2</option>
                <option value="3">جولة 3</option>
                <option value="4">جولة 4</option>
            </select>
        </div>
        <div id="matchesList"></div>
    </div>

    <!-- لوحة التحكم -->
    <div id="admin" class="view">
        <div class="card">
            <h3 style="text-align: center; color: var(--gold);">تسجيل مباراة جديدة</h3>
            <label>رقم الجولة</label>
            <input type="number" id="admRound" value="1">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>اللاعب 1</label>
                    <select id="admP1"></select>
                    <input type="number" id="admS1" placeholder="أهداف">
                </div>
                <div>
                    <label>اللاعب 2</label>
                    <select id="admP2"></select>
                    <input type="number" id="admS2" placeholder="أهداف">
                </div>
            </div>
            <button class="btn-action" onclick="saveNewMatch()">حفظ النتيجة ونشرها ✅</button>
        </div>
    </div>
</main>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showScreen('home', this)">
        <i>🏠</i>
        <span>الرئيسية</span>
    </div>
    <div class="nav-item" onclick="showScreen('matches', this)">
        <i>⚽</i>
        <span>المواجهات</span>
    </div>
    <div class="nav-item" onclick="showAdmin(this)">
        <i>⚙️</i>
        <span>التحكم</span>
    </div>
</nav>

<script>
    const SB_URL = "https://phgeppldziwtjqmomvlt.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZ2VwcGxkeml3dGpxbW9tdmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDYwNTIsImV4cCI6MjA4OTAzMjA1Mn0.eKq3YFv_3F28p8h27K986m-047zK8H551qP8f_1u-3I";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    let players = [];

    async function fetchData() {
        const { data, error } = await supabase.from('player').select('*').order('points', {ascending: false});
        if (error) {
            document.getElementById('connectionDot').style.background = '#ef4444';
            return;
        }
        players = data || [];
        renderStandings();
    }

    function renderStandings() {
        const body = document.getElementById('standingsBody');
        body.innerHTML = players.map((p, i) => `
            <tr>
                <td style="color: #64748b;">${i+1}</td>
                <td style="text-align: right;">${p.name}</td>
                <td>${p.played}</td>
                <td style="color: var(--primary); font-size: 1.1rem;">${p.points}</td>
            </tr>
        `).join('');
    }

    async function loadMatches() {
        const round = document.getElementById('roundFilter').value;
        const { data } = await supabase.from('matches').select('*').eq('round', round).order('created_at', {ascending: false});
        const container = document.getElementById('matchesList');
        
        if (!data || data.length === 0) {
            container.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:20px;">لا توجد نتائج مسجلة لهذه الجولة</p>';
            return;
        }

        container.innerHTML = data.map(m => `
            <div class="match-card">
                <span style="flex:1; text-align:right;">${m.p1_name}</span>
                <div class="score">${m.p1_score} - ${m.p2_score}</div>
                <span style="flex:1; text-align:left;">${m.p2_name}</span>
            </div>
        `).join('');
    }

    function showScreen(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');

        if(id === 'matches') loadMatches();
    }

    function showAdmin(btn) {
        const pw = prompt("كلمة مرور الإدارة:");
        if (pw === "bashar123") {
            showScreen('admin', btn);
            populatePlayersSelect();
        } else if (pw !== null) {
            alert("خطأ في كلمة المرور");
        }
    }

    function populatePlayersSelect() {
        const options = players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('admP1').innerHTML = options;
        document.getElementById('admP2').innerHTML = options;
    }

    async function saveNewMatch() {
        const p1Id = document.getElementById('admP1').value;
        const p2Id = document.getElementById('admP2').value;
        const s1 = parseInt(document.getElementById('admS1').value);
        const s2 = parseInt(document.getElementById('admS2').value);
        const round = document.getElementById('admRound').value;

        if (p1Id === p2Id) return alert("اختر لاعبين مختلفين!");
        if (isNaN(s1) || isNaN(s2)) return alert("أدخل الأهداف");

        const p1 = players.find(p => p.id == p1Id);
        const p2 = players.find(p => p.id == p2Id);

        // حساب النقاط
        let p1pts = 0, p2pts = 0, p1w = 0, p2w = 0;
        if (s1 > s2) { p1pts = 3; p1w = 1; }
        else if (s2 > s1) { p2pts = 3; p2w = 1; }
        else { p1pts = 1; p2pts = 1; }

        try {
            await Promise.all([
                supabase.from('player').update({
                    played: p1.played + 1, win: p1.win + p1w, points: p1.points + p1pts
                }).eq('id', p1Id),
                supabase.from('player').update({
                    played: p2.played + 1, win: p2.win + p2w, points: p2.points + p2pts
                }).eq('id', p2Id),
                supabase.from('matches').insert([{
                    p1_name: p1.name, p2_name: p2.name, p1_score: s1, p2_score: s2, round: round
                }])
            ]);
            alert("تم الحفظ بنجاح!");
            location.reload();
        } catch (e) { alert("خطأ في الحفظ"); }
    }

    window.onload = fetchData;
</script>
</body>
</html>
