<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة صعود التشكيلة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b1a33; color: white; margin: 0; text-align: center; }
        header { background: #16263f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2563eb; }
        .menu-btn { font-size: 28px; cursor: pointer; padding: 0 15px; }
        #menuPanel { display: none; background: #101c33; padding: 10px; border-bottom: 1px solid #333; }
        button { padding: 12px 25px; border: none; background: #22c55e; color: white; margin: 5px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #16a34a; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        table { margin: 20px auto; border-collapse: collapse; width: 95%; background: white; color: black; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #2563eb; color: white; font-size: 14px; }
        tr:nth-child(even) { background: #f9f9f9; }

        .match-box { background: #16263f; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; }
        select, input { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        input { width: 60px; text-align: center; }
        
        #home img { width: 180px; height: auto; margin: 20px; border-radius: 50%; border: 3px solid #2563eb; }
        .loading { color: #22c55e; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="width: 40px;"></div>
    <h3>🏆 صعود التشكيلة</h3>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div id="menuPanel">
    <button onclick="showScreen('home')">🏠 الرئيسية</button>
    <button onclick="showScreen('table')">📊 الترتيب</button>
    <button onclick="showScreen('matches')">⚽ النتائج</button>
</div>

<!-- الشاشة الرئيسية -->
<div id="home" class="screen active">
    <img src="https://via.placeholder.com/150?text=Logo" alt="Logo"> <!-- استبدل برابط اللوجو الحقيقي -->
    <h1>مرحباً بكم في البطولة</h1>
    <p style="color: #bbb;">تحت إشراف: بشار طلعت ومحمد محمود عادل</p>
    <div style="background: #16263f; padding: 15px; border-radius: 10px; margin: 20px;">
        <p>استخدم القائمة العلوية للتنقل بين الترتيب وتسجيل المباريات</p>
    </div>
</div>

<!-- شاشة الجدول -->
<div id="table" class="screen">
    <h2>📊 جدول الترتيب العام</h2>
    <div id="loadingTable" class="loading">جاري التحديث...</div>
    <table>
        <thead>
            <tr>
                <th>اللاعب</th>
                <th>لعب</th>
                <th>فوز</th>
                <th>تعادل</th>
                <th>خسارة</th>
                <th>له</th>
                <th>عليه</th>
                <th>نقاط</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- شاشة المباريات -->
<div id="matches" class="screen">
    <h2>⚽ تسجيل ماتش جديد</h2>
    <div class="match-box">
        <div>
            <select id="p1"></select>
            <input id="g1" type="number" min="0" placeholder="0">
        </div>
        <div style="margin: 10px; font-weight: bold; font-size: 20px;">VS</div>
        <div>
            <select id="p2"></select>
            <input id="g2" type="number" min="0" placeholder="0">
        </div>
        <br>
        <button id="saveBtn" onclick="saveMatch()">حفظ النتيجة ✅</button>
    </div>
    <p id="matchStatus"></p>
</div>

<script>
    // إعدادات Supabase (بياناتك يا بشار)
    const SUPABASE_URL = "https://phgeppldziwtjqmomvlt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZ2VwcGxkeml3dGpxbW9tdmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDYwNTIsImV4cCI6MjA4OTAzMjA1Mn0.eKq3YFv_3F28p8h27K986m-047zK8H551qP8f_1u-3I"; // تم وضع الـ Key الصحيح
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function toggleMenu() {
        let menu = document.getElementById("menuPanel");
        menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }

    function showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        toggleMenu();
        if (id === 'table' || id === 'matches') loadPlayers();
    }

    async function loadPlayers() {
        document.getElementById("loadingTable").style.display = "block";
        let { data, error } = await supabaseClient
            .from("player")
            .select("*")
            .order("points", { ascending: false })
            .order("goals_for", { ascending: false });

        if (error) {
            console.error(error);
            return;
        }

        let body = document.getElementById("tableBody");
        let s1 = document.getElementById("p1");
        let s2 = document.getElementById("p2");

        body.innerHTML = "";
        s1.innerHTML = "";
        s2.innerHTML = "";

        data.forEach(p => {
            body.innerHTML += `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.played}</td>
                    <td>${p.win}</td>
                    <td>${p.draw}</td>
                    <td>${p.loss}</td>
                    <td>${p.goals_for}</td>
                    <td>${p.goals_against}</td>
                    <td style="background:#dcfce7; font-weight:bold;">${p.points}</td>
                </tr>`;
            
            let opt = `<option value="${p.id}">${p.name}</option>`;
            s1.innerHTML += opt;
            s2.innerHTML += opt;
        });
        document.getElementById("loadingTable").style.display = "none";
    }

    async function saveMatch() {
        const p1Id = document.getElementById("p1").value;
        const p2Id = document.getElementById("p2").value;
        const g1 = parseInt(document.getElementById("g1").value);
        const g2 = parseInt(document.getElementById("g2").value);
        const saveBtn = document.getElementById("saveBtn");

        if (p1Id === p2Id) return alert("لا يمكن اختيار نفس اللاعب!");
        if (isNaN(g1) || isNaN(g2)) return alert("برجاء إدخال الأهداف!");

        saveBtn.disabled = true;
        saveBtn.innerText = "جاري الحفظ...";

        // جلب بيانات اللاعبين
        let { data: players } = await supabaseClient.from("player").select("*").in("id", [p1Id, p2Id]);
        
        let A = players.find(p => p.id == p1Id);
        let B = players.find(p => p.id == p2Id);

        // تحديث الإحصائيات
        A.played++;
        B.played++;
        A.goals_for += g1;
        A.goals_against += g2;
        B.goals_for += g2;
        B.goals_against += g1;

        if (g1 > g2) {
            A.win++; B.loss++; A.points += 3;
        } else if (g2 > g1) {
            B.win++; A.loss++; B.points += 3;
        } else {
            A.draw++; B.draw++; A.points += 1; B.points += 1;
        }

        // إرسال التحديثات لـ Supabase
        await supabaseClient.from("player").update(A).eq("id", A.id);
        await supabaseClient.from("player").update(B).eq("id", B.id);

        alert("تم حفظ النتيجة وتحديث الجدول! ✅");
        document.getElementById("g1").value = "";
        document.getElementById("g2").value = "";
        saveBtn.disabled = false;
        saveBtn.innerText = "حفظ النتيجة ✅";
        showScreen('table');
    }

    // التحميل الأولي
    window.onload = loadPlayers;
</script>

</body>
</html>
