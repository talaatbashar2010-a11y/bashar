<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة صعود التشكيلة | الدوري الرسمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #1e293b;
            --accent: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --gold: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 40px;
            line-height: 1.6;
        }

        /* Header & Logo Section */
        header {
            background: var(--secondary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo-placeholder {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            border: 2px solid var(--gold);
        }

        /* Navigation Menu */
        .nav-trigger { font-size: 28px; cursor: pointer; color: var(--primary); }
        
        #sideMenu {
            display: none;
            position: fixed;
            top: 75px; left: 0; right: 0;
            background: var(--secondary);
            padding: 20px;
            flex-direction: column;
            gap: 15px;
            z-index: 999;
            border-bottom: 3px solid var(--primary);
        }
        #sideMenu.active { display: flex; }
        #sideMenu button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #sideMenu button:hover { background: var(--primary); }

        /* Screens */
        .screen { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .active-screen { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Dashboard */
        .top-hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=800');
            background-size: cover;
            padding: 40px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .leader-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            border-top: 4px solid var(--gold);
        }

        /* Tables */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 15px; font-size: 14px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        .rank-1 { color: var(--gold); font-weight: bold; }

        /* Match Cards */
        .match-card {
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-right: 4px solid var(--primary);
        }
        .score-pill {
            background: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 800;
            min-width: 50px;
        }

        /* Admin Controls */
        .form-group { text-align: right; margin-bottom: 15px; }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px;
            background: #0f172a; border: 1px solid #334155;
            color: white; font-size: 16px; margin-top: 5px;
        }
        .submit-btn {
            background: var(--accent); color: white; padding: 15px;
            border: none; border-radius: 8px; width: 100%; font-weight: bold;
            font-size: 18px; cursor: pointer; margin-top: 10px;
        }

        .loading-text { color: var(--primary); font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo-placeholder" id="mainLogo">S</div>
    <h2 style="margin: 0; font-size: 20px;">صعود التشكيلة</h2>
    <div class="nav-trigger" onclick="toggleNav()">☰</div>
</header>

<div id="sideMenu">
    <button onclick="changeScreen('home')">🏠 لوحة الصدارة</button>
    <button onclick="changeScreen('stats')">📊 جدول الترتيب</button>
    <button onclick="changeScreen('matches')">📅 نتائج الجولات</button>
    <button onclick="adminLogin()" style="color: var(--danger);">⚙️ لوحة التحكم</button>
</div>

<!-- الشاشة الرئيسية -->
<div id="home" class="screen active-screen">
    <div class="top-hero">
        <div class="leader-box">
            <span style="font-size: 14px; opacity: 0.8;">🥇 متصدر الدوري حالياً</span>
            <div id="heroLeader" style="font-size: 28px; font-weight: bold; color: var(--gold);">جاري التحميل...</div>
        </div>
    </div>
    <div style="margin-top: 20px; text-align: center; opacity: 0.6;">
        <p>إدارة وتنظيم: <strong>بشار طلعت</strong></p>
    </div>
</div>

<!-- شاشة الجدول -->
<div id="stats" class="screen">
    <h3 style="text-align: right;">📊 الترتيب العام</h3>
    <div id="statsLoader" class="loading-text">جاري مزامنة البيانات...</div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>اللاعب</th>
                    <th>لعب</th>
                    <th>ف</th>
                    <th>ت</th>
                    <th>خ</th>
                    <th>ن</th>
                </tr>
            </thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </div>
</div>

<!-- شاشة المباريات -->
<div id="matches" class="screen">
    <h3 style="text-align: right;">📅 أرشيف الجولات</h3>
    <select id="roundSelector" onchange="loadMatches()" style="margin-bottom: 20px;">
        <option value="1">الجولة الأولى</option>
        <option value="2">الجولة الثانية</option>
        <option value="3">الجولة الثالثة</option>
        <option value="4">الجولة الرابعة</option>
        <option value="5">الجولة الخامسة</option>
        <option value="6">الجولة السادسة</option>
        <option value="7">الجولة السابعة</option>
        <option value="8">الجولة الثامنة</option>
        <option value="9">الجولة التاسعة</option>
    </select>
    <div id="matchesContainer"></div>
</div>

<!-- لوحة التحكم -->
<div id="admin" class="screen">
    <h3 style="color: var(--danger);">⚙️ تسجيل نتيجة رسمية</h3>
    <div style="background: var(--card-bg); padding: 20px; border-radius: 15px;">
        <div class="form-group">
            <label>رقم الجولة</label>
            <input type="number" id="matchRound" value="1">
        </div>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>اللاعب 1</label>
                <select id="p1Select"></select>
                <input type="number" id="p1Score" placeholder="أهداف">
            </div>
            <div style="flex: 1;">
                <label>اللاعب 2</label>
                <select id="p2Select"></select>
                <input type="number" id="p2Score" placeholder="أهداف">
            </div>
        </div>
        <button class="submit-btn" id="saveBtn" onclick="submitResult()">اعتماد النتيجة ✅</button>
    </div>
</div>

<script>
    // الإعدادات الأساسية
    const SUPABASE_URL = "https://phgeppldziwtjqmomvlt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZ2VwcGxkeml3dGpxbW9tdmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDYwNTIsImV4cCI6MjA4OTAzMjA1Mn0.eKq3YFv_3F28p8h27K986m-047zK8H551qP8f_1u-3I";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let players = [];

    // جلب البيانات
    async function fetchData() {
        const { data, error } = await supabase.from('player').select('*').order('points', {ascending: false}).order('win', {ascending: false}).order('goals_for', {ascending: false});
        if (data) {
            players = data;
            renderStandings();
            document.getElementById('statsLoader').style.display = 'none';
            if (players.length > 0) document.getElementById('heroLeader').innerText = players[0].name;
        }
    }

    function renderStandings() {
        const body = document.getElementById('standingsBody');
        body.innerHTML = players.map((p, i) => `
            <tr>
                <td class="${i === 0 ? 'rank-1' : ''}">${i + 1}</td>
                <td style="text-align: right; font-weight: bold;">${p.name}</td>
                <td>${p.played}</td>
                <td>${p.win}</td>
                <td>${p.draw}</td>
                <td>${p.loss}</td>
                <td style="color: var(--primary); font-weight: 800;">${p.points}</td>
            </tr>
        `).join('');
    }

    async function loadMatches() {
        const r = document.getElementById('roundSelector').value;
        const container = document.getElementById('matchesContainer');
        container.innerHTML = "<p>جاري التحميل...</p>";
        
        const { data } = await supabase.from('matches').select('*').eq('round', r).order('created_at', {ascending: false});
        
        if(!data || data.length === 0) {
            container.innerHTML = "<p style='opacity: 0.5; text-align: center; padding: 20px;'>لم يتم لعب أي مباريات في هذه الجولة بعد</p>";
            return;
        }
        
        container.innerHTML = data.map(m => `
            <div class="match-card">
                <span style="flex: 1; text-align: right; font-weight: 600;">${m.p1_name}</span>
                <span class="score-pill">${m.p1_score} - ${m.p2_score}</span>
                <span style="flex: 1; text-align: left; font-weight: 600;">${m.p2_name}</span>
            </div>
        `).join('');
    }

    // التنقل بين الشاشات
    function toggleNav() { document.getElementById('sideMenu').classList.toggle('active'); }

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        toggleNav();
        if (id === 'admin') populateAdminSelects();
        if (id === 'matches') loadMatches();
        fetchData();
    }

    function populateAdminSelects() {
        const s1 = document.getElementById('p1Select');
        const s2 = document.getElementById('p2Select');
        const options = players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        s1.innerHTML = s2.innerHTML = options;
    }

    function adminLogin() {
        const p = prompt("كلمة مرور المشرف:");
        if (p === "bashar123") changeScreen('admin');
        else if (p !== null) alert("خطأ في كلمة المرور");
    }

    async function submitResult() {
        const p1Id = document.getElementById('p1Select').value;
        const p2Id = document.getElementById('p2Select').value;
        const s1 = parseInt(document.getElementById('p1Score').value);
        const s2 = parseInt(document.getElementById('p2Score').value);
        const round = document.getElementById('matchRound').value;

        if (p1Id === p2Id || isNaN(s1) || isNaN(s2)) return alert("يرجى التحقق من صحة البيانات");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "جاري الحفظ...";

        try {
            let pl1 = players.find(p => p.id == p1Id);
            let pl2 = players.find(p => p.id == p2Id);

            pl1.played++; pl2.played++;
            pl1.goals_for += s1; pl1.goals_against += s2;
            pl2.goals_for += s2; pl2.goals_against += s1;

            if (s1 > s2) { pl1.win++; pl1.points += 3; pl2.loss++; }
            else if (s2 > s1) { pl2.win++; pl2.points += 3; pl1.loss++; }
            else { pl1.draw++; pl2.draw++; pl1.points += 1; pl2.points += 1; }

            await supabase.from('player').update(pl1).eq('id', pl1.id);
            await supabase.from('player').update(pl2).eq('id', pl2.id);
            await supabase.from('matches').insert([{p1_name: pl1.name, p2_name: pl2.name, p1_score: s1, p2_score: s2, round: round}]);

            alert("تم تسجيل النتيجة وتحديث الترتيب بنجاح! ⚽");
            changeScreen('stats');
        } catch (e) {
            alert("حدث خطأ تقني!");
        } finally {
            btn.disabled = false; btn.innerText = "اعتماد النتيجة ✅";
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>
