<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بطولة صعود التشكيلة</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#28a745;
color:white;
font-size:16px;
cursor:pointer;
}

table{
width:90%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #444;
padding:10px;
}

th{
background:#007aff;
}

.match{
background:#222;
padding:15px;
margin:10px;
border-radius:10px;
}

input{
width:50px;
text-align:center;
}

</style>
</head>

<body>

<h1>🏆 بطولة صعود التشكيلة</h1>

<h2>جدول الترتيب</h2>

<table>
<thead>
<tr>
<th>اللاعب</th>
<th>لعب</th>
<th>فوز</th>
<th>تعادل</th>
<th>خسارة</th>
<th>له</th>
<th>عليه</th>
<th>نقاط</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<h2>📅 الجولة 1</h2>

<div class="match">

أحمد طواب 🆚 بشار طلعت

<br><br>

<input id="g1a"> -

<input id="g1b">

<br><br>

<button onclick="saveMatch('أحمد طواب','بشار طلعت','g1a','g1b')">
حفظ النتيجة
</button>

</div>

<div class="match">

محمد عماد 🆚 أسر محمد

<br><br>

<input id="g2a"> -

<input id="g2b">

<br><br>

<button onclick="saveMatch('محمد عماد','أسر محمد','g2a','g2b')">
حفظ النتيجة
</button>

</div>

<script>

const SUPABASE_URL = "https://phgeppldziwtjqmomvlt.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZ2VwcGxkeml3dGpxbW9tdmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTY4NTksImV4cCI6MjA4OTA3Mjg1OX0.d-wOoHmvY1DkyukIDWX6XyBGEuML2s9aybaLaJ8E41A"

const supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function loadTable(){

let {data}=await supabase
.from("player")
.select("*")
.order("points",{ascending:false})

let body=document.getElementById("tableBody")

body.innerHTML=""

data.forEach(p=>{

body.innerHTML+=`

<tr>

<td>${p.name}</td>

<td>${p.played}</td>

<td>${p.win}</td>

<td>${p.draw}</td>

<td>${p.loss}</td>

<td>${p.goals_for}</td>

<td>${p.goals_against}</td>

<td>${p.points}</td>

</tr>

`

})

}

async function saveMatch(p1,p2,id1,id2){

let g1=parseInt(document.getElementById(id1).value)

let g2=parseInt(document.getElementById(id2).value)

let {data:players}=await supabase
.from("player")
.select("*")
.or(`name.eq.${p1},name.eq.${p2}`)

let A=players.find(x=>x.name==p1)

let B=players.find(x=>x.name==p2)

A.played++
B.played++

A.goals_for+=g1
A.goals_against+=g2

B.goals_for+=g2
B.goals_against+=g1

if(g1>g2){

A.win++
A.points+=3
B.loss++

}

else if(g2>g1){

B.win++
B.points+=3
A.loss++

}

else{

A.draw++
B.draw++
A.points++
B.points++

}

await supabase.from("player").update(A).eq("id",A.id)

await supabase.from("player").update(B).eq("id",B.id)

loadTable()

}

loadTable()

</script>

</body>
</html>
