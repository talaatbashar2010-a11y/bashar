<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بطولة صعود التشكيلة</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0b1a33;
color:white;
margin:0;
text-align:center;
}

header{
background:#16263f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{
font-size:26px;
cursor:pointer;
}

#menuPanel{
display:none;
background:#101c33;
padding:10px;
}

button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
margin:5px;
cursor:pointer;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#2563eb;
color:white;
}

#home img{
width:240px;
margin-top:20px;
}

</style>
</head>

<body>

<header>

<h3>بطولة صعود التشكيلة</h3>

<div class="menu" onclick="toggleMenu()">☰</div>

</header>

<div id="menuPanel">

<button onclick="showScreen('home')">الرئيسية</button>

<button onclick="showScreen('table')">جدول الترتيب</button>

<button onclick="showScreen('matches')">المباريات</button>

</div>


<div id="home" class="screen active">

<img src="logo.png">

<h1>مرحبا بكم في بطولة صعود التشكيلة</h1>

<p>اختر من القائمة لعرض الميزات</p>

<p>تحت إشراف بشار طلعت ومحمد محمود عادل</p>

<p>تم إنشاء الويب بواسطة بشار طلعت</p>

</div>


<div id="table" class="screen">

<h2>جدول الترتيب</h2>

<table>

<thead>

<tr>
<th>اللاعب</th>
<th>لعب</th>
<th>فوز</th>
<th>تعادل</th>
<th>خسارة</th>
<th>له</th>
<th>عليه</th>
<th>نقاط</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<div id="matches" class="screen">

<h2>تسجيل نتيجة مباراة</h2>

<select id="p1"></select>
<input id="g1" type="number" placeholder="أهداف">

VS

<select id="p2"></select>
<input id="g2" type="number" placeholder="أهداف">

<br><br>

<button onclick="saveMatch()">حفظ النتيجة</button>

</div>


<script>

const SUPABASE_URL="https://phgeppldziwtjqmomvlt.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZ2VwcGxkeml3dGpxbW9tdmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTY4NTksImV4cCI6MjA4OTA3Mjg1OX0.d-wOoHmvY1DkyukIDWX6XyBGEuML2s9aybaLaJ8E41A"

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)


function toggleMenu(){

let menu=document.getElementById("menuPanel")

if(menu.style.display==="block"){
menu.style.display="none"
}else{
menu.style.display="block"
}

}


function showScreen(id){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}


async function loadPlayers(){

let {data}=await supabaseClient
.from("player")
.select("*")
.order("points",{ascending:false})

let body=document.getElementById("tableBody")

body.innerHTML=""

data.forEach(p=>{

body.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.played}</td>
<td>${p.win}</td>
<td>${p.draw}</td>
<td>${p.loss}</td>
<td>${p.goals_for}</td>
<td>${p.goals_against}</td>
<td>${p.points}</td>
</tr>
`

})

let s1=document.getElementById("p1")
let s2=document.getElementById("p2")

s1.innerHTML=""
s2.innerHTML=""

data.forEach(p=>{

s1.innerHTML+=`<option>${p.name}</option>`
s2.innerHTML+=`<option>${p.name}</option>`

})

}


async function saveMatch(){

let p1=document.getElementById("p1").value
let p2=document.getElementById("p2").value

let g1=parseInt(document.getElementById("g1").value)
let g2=parseInt(document.getElementById("g2").value)

let {data:players}=await supabaseClient
.from("player")
.select("*")
.or(`name.eq.${p1},name.eq.${p2}`)

let A=players.find(p=>p.name===p1)
let B=players.find(p=>p.name===p2)

A.played++
B.played++

A.goals_for+=g1
A.goals_against+=g2

B.goals_for+=g2
B.goals_against+=g1

if(g1>g2){
A.win++
B.loss++
A.points+=3
}

else if(g2>g1){
B.win++
A.loss++
B.points+=3
}

else{
A.draw++
B.draw++
A.points++
B.points++
}

await supabaseClient.from("player").update(A).eq("id",A.id)
await supabaseClient.from("player").update(B).eq("id",B.id)

loadPlayers()

}


loadPlayers()

</script>

</body>
</html>
