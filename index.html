<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القائمة - صعود التشكيلة</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #16263f;
            --bg: #0b1a33;
            --text: #ffffff;
        }

        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* الهيدر */
        header { 
            background: var(--secondary); 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--primary);
            position: sticky; top: 0; z-index: 2000;
        }

        .menu-btn { font-size: 30px; cursor: pointer; color: var(--primary); padding: 5px 15px; }

        /* القائمة المنسدلة */
        #menuPanel { 
            display: none; 
            position: fixed; top: 65px; left: 0; right: 0;
            background: var(--secondary); 
            flex-direction: column; padding: 10px;
            border-bottom: 2px solid var(--primary);
            z-index: 1999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #menuPanel.active { display: flex; }

        button { 
            padding: 15px; margin: 5px 0; border: none; 
            background: rgba(255,255,255,0.1); color: white; 
            border-radius: 5px; font-weight: bold; font-size: 16px;
        }

        .screen { display: none; padding: 50px 20px; text-align: center; }
        .screen.active { display: block; }
    </style>
</head>
<body>

<header>
    <div style="width:40px"></div>
    <h3>🏆 صعود التشكيلة</h3>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<nav id="menuPanel">
    <button onclick="changeScreen('home')">🏠 الرئيسية</button>
    <button onclick="changeScreen('table')">📊 الترتيب</button>
    <button onclick="changeScreen('rounds')">📅 الجولات</button>
</nav>

<div id="home" class="screen active"><h1>الشاشة الرئيسية شغال ✅</h1></div>
<div id="table" class="screen"><h1>شاشة الجدول شغال ✅</h1></div>
<div id="rounds" class="screen"><h1>شاشة الجولات شغال ✅</h1></div>

<script>
    function toggleMenu() {
        document.getElementById('menuPanel').classList.toggle('active');
    }

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('menuPanel').classList.remove('active');
    }
</script>
</body>
</html>
