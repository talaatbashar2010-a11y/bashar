<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة صعود التشكيلة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #252525; }
        .form-section { background: #222; padding: 20px; border-radius: 10px; margin-top: 30px; border: 1px solid #444; }
        select, input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; font-size: 16px; }
        input { width: 80px; text-align: center; }
        button { background-color: #28a745; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .success-msg { color: #28a745; display: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 بطولة صعود التشكيلة</h1>
        
        <div id="loading">جاري تحميل جدول الترتيب...</div>

        <table id="leagueTable">
            <thead>
                <tr>
                    <th>اللاعب</th>
                    <th>لعب</th>
                    <th>فوز</th>
                    <th>تعادل</th>
                    <th>هزيمة</th>
                    <th>نقاط</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="form-section">
            <h3>تسجيل نتيجة ماتش</h3>
            <select id="playerSelect"></select>
            <input type="number" id="ptsInput" placeholder="النقاط">
            <button onclick="updateData()">حفظ النتيجة</button>
            <p id="msg" class="success-msg">تم التحديث بنجاح! ✅</p>
        </div>
    </div>

    <script>
        // بياناتك اللي بعتها يا بشار
        const SUPABASE_URL = 'https://pawzizyrugnzunegchch.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhd3ppenlydWduenVuZWdjaGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDI0NDMsImV4cCI6MjA4OTAxODQ0M30.dMs84AcG2FOrzqSBfXbzNiRVufn9-t6FmfP0d7G8Rzw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadTable() {
            const { data, error } = await _supabase.from('bashar').select('*').order('points', { ascending: false });
            if (error) return console.error(error);
            
            const tableBody = document.getElementById('tableBody');
            const playerSelect = document.getElementById('playerSelect');
            tableBody.innerHTML = '';
            playerSelect.innerHTML = '';
            document.getElementById('loading').style.display = 'none';

            data.forEach(p => {
                tableBody.innerHTML += `<tr>
                    <td>${p.name}</td>
                    <td>${p.played || 0}</td>
                    <td>${p.win || 0}</td>
                    <td>${p.draw || 0}</td>
                    <td>${p.loss || 0}</td>
                    <td>${p.points || 0}</td>
                </tr>`;
                playerSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        }

        async function updateData() {
            const id = document.getElementById('playerSelect').value;
            const newPoints = document.getElementById('ptsInput').value;

            if (!newPoints) return alert("دخل النقاط الأول!");

            const { error } = await _supabase
                .from('bashar')
                .update({ points: parseInt(newPoints) }) 
                .eq('id', id);

            if (!error) {
                document.getElementById('msg').style.display = 'block';
                loadTable();
                setTimeout(() => document.getElementById('msg').style.display = 'none', 3000);
            } else {
                alert("مشكلة في الحفظ: تأكد من إعدادات RLS في Supabase");
            }
        }

        loadTable();
    </script>
</body>
</html>
